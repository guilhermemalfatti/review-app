services:
  postgres:
    image: postgres:16-alpine
    container_name: indica-postgres
    environment:
      POSTGRES_USER: indica
      POSTGRES_PASSWORD: indica
      POSTGRES_DB: indica
    ports:
      - "5432:5432"
    volumes:
      - indica_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indica -d indica"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  indica_pgdata:
